<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>CodeLearnAI</title>
	<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-900">

	<nav class="bg-white shadow-md p-4 flex justify-between items-center">
		<h1 class="text-2xl font-bold text-indigo-600">CodeLearnAI</h1>
		<div>
			{% if user.is_authenticated %}
				<span class="mr-3">Hello, {{ user.username }}</span>
				<a href="/accounts/logout/" class="px-4 py-2 bg-gray-100 rounded-xl">Logout</a>
			{% else %}
				<a href="/accounts/login/" class="px-4 py-2 bg-indigo-600 text-white rounded-xl">Login</a>
			{% endif %}
		</div>
	</nav>

	<div class="grid grid-cols-4 gap-4 p-6">
		<aside class="col-span-1 bg-white p-4 rounded-2xl shadow-md">
			<div>
				<h2 class="text-xl font-bold">Project</h2>
				<p class="text-gray-600">Select a project on the right</p>
			</div>
			<div class="mt-6">
				<h3 class="text-lg font-semibold">Community Q&A</h3>
				<p class="text-gray-600">Ask and answer questions on each project.</p>
			</div>
		</aside>

		<main class="col-span-3 bg-white rounded-2xl shadow-md p-4">
			<div class="flex justify-between items-center mb-3">
				<h2 class="text-xl font-bold">Welcome</h2>
			</div>
			<pre class="bg-gray-900 text-green-200 p-4 rounded-lg overflow-auto">Use the API endpoints to import a GitHub repo, then navigate to a project page.</pre>
		</main>
	</div>
</body>
</html>
