<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<title>{{ project.name }} - CodeLearnAI</title>
	<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-900">
	<nav class="bg-white shadow-md p-4 flex justify-between items-center">
		<h1 class="text-2xl font-bold text-indigo-600">CodeLearnAI</h1>
		<div>
			<a href="/" class="px-4 py-2 bg-gray-100 rounded-xl">Home</a>
		</div>
	</nav>
	<div class="grid grid-cols-4 gap-4 p-6">
		<aside class="col-span-1 bg-white p-4 rounded-2xl shadow-md">
			<h2 class="text-xl font-bold">{{ project.name }}</h2>
			<p class="text-gray-600">Author: {{ project.owner.username }}</p>
			<p class="mt-2">Language: {{ project.language }}</p>
			<p>Level: {{ project.difficulty|title }}</p>
			<p class="mt-3 text-gray-700">{{ project.description }}</p>
			<div class="mt-6">
				<h3 class="text-lg font-semibold">Community Q&A</h3>
				<div id="qa" class="mt-2 space-y-3"></div>
				<textarea id="questionBody" placeholder="Ask a question..." class="w-full mt-3 p-2 border rounded-lg"></textarea>
				<button id="postBtn" class="mt-2 px-3 py-1 bg-indigo-600 text-white rounded-lg">Post</button>
			</div>
		</aside>
		<main class="col-span-3 bg-white rounded-2xl shadow-md p-4">
			<div class="flex justify-between items-center mb-3">
				<h2 class="text-xl font-bold" id="fileTitle">Select a file</h2>
				<button id="explainBtn" class="bg-indigo-100 text-indigo-600 px-3 py-1 rounded-lg">?</button>
			</div>
			<div class="grid grid-cols-3 gap-4">
				<div id="files" class="col-span-1 border rounded-lg p-2 max-h-[70vh] overflow-auto"></div>
				<pre id="code" class="col-span-2 bg-gray-900 text-green-200 p-4 rounded-lg overflow-auto max-h-[70vh]"></pre>
			</div>
		</main>
	</div>
	<script>
	const projectId = {{ project.id }};
	const filesEl = document.getElementById('files');
	const codeEl = document.getElementById('code');
	const fileTitle = document.getElementById('fileTitle');
	let currentPath = '';

	async function loadFiles(){
		const res = await fetch(`/api/projects/files/?project=${projectId}`);
		const data = await res.json();
		filesEl.innerHTML = '';
		data.results?.forEach(item => {
			const div = document.createElement('div');
			div.className = 'px-2 py-1 hover:bg-gray-50 rounded cursor-pointer flex items-center';
			div.textContent = (item.is_dir ? '📁 ' : '📄 ') + item.path;
			div.onclick = () => loadFileContent(item);
			filesEl.appendChild(div);
		});
	}

	async function loadFileContent(item){
		if(item.is_dir){ return; }
		currentPath = item.path;
		fileTitle.textContent = item.path;
		try {
			const res = await fetch('{{ project.html_url }}'.replace('https://github.com/','https://raw.githubusercontent.com/') + `/main/${item.path}`);
			const text = await res.text();
			codeEl.textContent = text;
		} catch(e) {
			codeEl.textContent = 'Unable to fetch file content.';
		}
	}

	document.getElementById('explainBtn').onclick = async () => {
		if(!codeEl.textContent){ return; }
		const res = await fetch('/api/ai/explain/', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ content: codeEl.textContent, path: currentPath }) });
		const data = await res.json();
		alert(data.explanation || data.error || 'No response');
	};

	document.getElementById('postBtn').onclick = async () => {
		const body = document.getElementById('questionBody').value;
		if(!body){ return; }
		await fetch('/api/community/questions/', { method:'POST', headers: { 'Content-Type':'application/json' }, body: JSON.stringify({ project: projectId, title: 'Question', body }) });
		location.reload();
	};

	loadFiles();
	</script>
</body>
</html>
